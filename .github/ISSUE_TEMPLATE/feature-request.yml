name: "Feature Request"
description: Suggest an improvement or a new idea
labels: ["enhancement"]
type: "Feature"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request.

        Please update the title above to concisely describe the feature.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature or improvement you'd like to see.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve or what use case does it address?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information (links, references, screenshots, etc.).
    validations:
      required: false