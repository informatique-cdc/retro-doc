<dialog
  #dialog
  class="session-expired"
  aria-labelledby="session-expired-title"
  aria-describedby="session-expired-desc"
  tabindex="-1"
  (keydown)="onKeydown($event)"
>
  <div class="session-expired__panel">
    <div class="session-expired__icon" aria-hidden="true">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#dc2626" stroke-width="1.5" />
        <path d="M12 8v4" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" />
        <circle cx="12" cy="16" r="1" fill="#dc2626" />
      </svg>
    </div>

    <h2 id="session-expired-title" class="session-expired__title">
      {{ 'auth.sessionExpiredTitle' | translate }}
    </h2>

    <p id="session-expired-desc" class="session-expired__message">
      {{ 'auth.sessionExpiredMessage' | translate }}
    </p>

    <div class="session-expired__timer-track" role="progressbar"
      [attr.aria-valuenow]="countdown()"
      aria-valuemin="0"
      aria-valuemax="10"
      [attr.aria-label]="'auth.redirectingIn' | translate: { seconds: countdown() }"
    >
      <div
        class="session-expired__timer-bar"
        [style.width.%]="progressPercent()"
      ></div>
    </div>

    <p class="session-expired__countdown">
      {{ 'auth.redirectingIn' | translate: { seconds: countdown() } }}
    </p>

    <button type="button" class="session-expired__reconnect" (click)="reconnectNow()">
      {{ 'auth.reconnectNow' | translate }}
    </button>
  </div>
</dialog>
